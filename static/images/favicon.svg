<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="14" fill="#111111"/>

  <!-- Rear wheel -->
  <circle cx="16" cy="46" r="11" fill="none" stroke="#dc2626" stroke-width="4"/>
  <circle cx="16" cy="46" r="2.5" fill="#dc2626"/>

  <!-- Front wheel -->
  <circle cx="49" cy="46" r="11" fill="none" stroke="#dc2626" stroke-width="4"/>
  <circle cx="49" cy="46" r="2.5" fill="#dc2626"/>

  <!-- Swing arm / rear frame -->
  <line x1="16" y1="46" x2="28" y2="34" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>

  <!-- Main frame: seat to front -->
  <polyline points="28,34 36,20 44,28 49,24"
            fill="none" stroke="#dc2626" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Engine block -->
  <rect x="26" y="33" width="16" height="11" rx="3" fill="#dc2626"/>

  <!-- Front fork -->
  <line x1="44" y1="28" x2="49" y2="35" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>

  <!-- Handlebar -->
  <line x1="42" y1="25" x2="48" y2="22" stroke="#dc2626" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Rider helmet (small circle) -->
  <circle cx="36" cy="17" r="5" fill="#dc2626"/>

  <!-- Seat line -->
  <line x1="28" y1="34" x2="40" y2="30" stroke="#ff4444" stroke-width="2.5" stroke-linecap="round"/>
</svg>
