<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <filter id="glow3"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="450" fill="#0f0f0f"/>

  <!-- Step badge -->
  <rect x="30" y="30" width="64" height="24" rx="12" fill="#dc2626"/>
  <text x="62" y="47" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="700">STEP 3</text>

  <!-- Left text -->
  <text x="30" y="100" fill="#f5f5f5" font-family="system-ui,sans-serif" font-size="26" font-weight="800">Tap the Button</text>
  <text x="30" y="133" fill="#f5f5f5" font-family="system-ui,sans-serif" font-size="26" font-weight="800">&amp; Confirm</text>
  <text x="30" y="175" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="14">Tap "Download APK" then</text>
  <text x="30" y="196" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="14">tap "Download Now" to start.</text>

  <!-- Steps flow -->
  <text x="30" y="248" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">1 ── Tap Download APK</text>
  <text x="30" y="268" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">2 ── Confirmation page opens</text>
  <text x="30" y="288" fill="#dc2626" font-family="system-ui,sans-serif" font-size="11" font-weight="600">3 ── Tap "Download Now"</text>
  <text x="30" y="308" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">4 ── Download begins</text>

  <text x="30" y="360" fill="#71717a" font-family="system-ui,sans-serif" font-size="12">Only use the main button on</text>
  <text x="30" y="378" fill="#71717a" font-family="system-ui,sans-serif" font-size="12">this page — not other popups.</text>

  <!-- Phone mockup -->
  <rect x="310" y="28" width="240" height="394" rx="28" fill="#1c1c1e" stroke="#3a3a3c" stroke-width="2"/>
  <rect x="395" y="28" width="70" height="16" rx="8" fill="#0f0f0f"/>
  <rect x="319" y="68" width="222" height="308" fill="#141414"/>
  <rect x="395" y="394" width="70" height="5" rx="3" fill="#3a3a3c"/>
  <rect x="308" y="130" width="4" height="50" rx="2" fill="#3a3a3c"/>
  <rect x="308" y="192" width="4" height="50" rx="2" fill="#3a3a3c"/>
  <rect x="546" y="155" width="4" height="60" rx="2" fill="#3a3a3c"/>

  <!-- Status bar -->
  <rect x="319" y="68" width="222" height="20" fill="#1c1c1e"/>
  <text x="329" y="82" fill="#a1a1aa" font-size="9">9:41</text>
  <text x="505" y="82" fill="#a1a1aa" font-size="9">📶 🔋</text>

  <!-- Page heading -->
  <rect x="319" y="88" width="222" height="28" fill="#1c1c1e"/>
  <text x="430" y="106" text-anchor="middle" fill="#f5f5f5" font-family="system-ui,sans-serif" font-size="10" font-weight="700">🏍️ Stunt Bike Extreme</text>
  <line x1="319" y1="116" x2="541" y2="116" stroke="#dc2626" stroke-width="1.5"/>

  <!-- Dimmed background content -->
  <rect x="319" y="116" width="222" height="260" fill="#141414" opacity="0.4"/>

  <!-- Confirmation dialog overlay -->
  <rect x="325" y="148" width="210" height="190" rx="14" fill="#1c1c1e" stroke="#3a3a3c" stroke-width="1.5"/>

  <!-- Dialog header -->
  <text x="430" y="175" text-anchor="middle" fill="#f5f5f5" font-family="system-ui,sans-serif" font-size="13" font-weight="700">Confirm Download</text>
  <line x1="338" y1="184" x2="522" y2="184" stroke="#2c2c2e" stroke-width="1"/>

  <!-- File info in dialog -->
  <text x="430" y="205" text-anchor="middle" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="9">StuntBikeExtreme.apk</text>
  <rect x="370" y="213" width="120" height="16" rx="4" fill="#2c2c2e"/>
  <text x="430" y="225" text-anchor="middle" fill="#71717a" font-size="8">85 MB  •  Android Game</text>

  <!-- Safety note -->
  <rect x="338" y="234" width="194" height="30" rx="6" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="430" y="250" text-anchor="middle" fill="#22c55e" font-family="system-ui,sans-serif" font-size="9">✓ Safe • Verified source</text>
  <text x="430" y="261" text-anchor="middle" fill="#71717a" font-family="system-ui,sans-serif" font-size="8">No registration required</text>

  <!-- Download Now button (main action) -->
  <rect x="338" y="272" width="194" height="36" rx="9" fill="#dc2626" filter="url(#glow3)"/>
  <text x="430" y="295" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="12" font-weight="700">⬇ Download Now</text>

  <!-- Cancel link -->
  <text x="430" y="325" text-anchor="middle" fill="#71717a" font-family="system-ui,sans-serif" font-size="10">Cancel</text>

  <!-- Tap indicator on the button -->
  <circle cx="430" cy="290" r="28" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <circle cx="430" cy="290" r="18" fill="rgba(255,255,255,0.12)"/>

  <!-- Finger/tap icon above button -->
  <text x="474" y="268" fill="white" font-size="18" opacity="0.9">👆</text>

  <!-- Right tips -->
  <text x="590" y="190" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">A confirmation</text>
  <text x="590" y="208" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">dialog will appear</text>
  <text x="590" y="250" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">Tap the red</text>
  <text x="590" y="268" fill="#dc2626" font-family="system-ui,sans-serif" font-size="11" font-weight="600">"Download Now"</text>
  <text x="590" y="286" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">button to begin</text>
</svg>
