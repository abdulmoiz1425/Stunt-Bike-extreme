<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="progFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="#0f0f0f"/>

  <!-- Step badge -->
  <rect x="30" y="30" width="64" height="24" rx="12" fill="#dc2626"/>
  <text x="62" y="47" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="700">STEP 4</text>

  <!-- Left text -->
  <text x="30" y="100" fill="#f5f5f5" font-family="system-ui,sans-serif" font-size="26" font-weight="800">Wait for the</text>
  <text x="30" y="133" fill="#f5f5f5" font-family="system-ui,sans-serif" font-size="26" font-weight="800">Download</text>
  <text x="30" y="175" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="14">The APK file will save to your</text>
  <text x="30" y="196" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="14">device. Speed depends on Wi-Fi.</text>

  <!-- Progress indicator on left -->
  <text x="30" y="250" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">DOWNLOAD PROGRESS</text>
  <rect x="30" y="260" width="230" height="12" rx="6" fill="#2c2c2e"/>
  <rect x="30" y="260" width="172" height="12" rx="6" fill="url(#progFill)"/>
  <text x="30" y="294" fill="#dc2626" font-family="system-ui,sans-serif" font-size="22" font-weight="800">75%</text>
  <text x="80" y="290" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">completed</text>

  <text x="30" y="345" fill="#71717a" font-family="system-ui,sans-serif" font-size="12">Do not close the browser</text>
  <text x="30" y="363" fill="#71717a" font-family="system-ui,sans-serif" font-size="12">while downloading.</text>

  <!-- Phone mockup -->
  <rect x="310" y="28" width="240" height="394" rx="28" fill="#1c1c1e" stroke="#3a3a3c" stroke-width="2"/>
  <rect x="395" y="28" width="70" height="16" rx="8" fill="#0f0f0f"/>
  <rect x="319" y="68" width="222" height="308" fill="#141414"/>
  <rect x="395" y="394" width="70" height="5" rx="3" fill="#3a3a3c"/>
  <rect x="308" y="130" width="4" height="50" rx="2" fill="#3a3a3c"/>
  <rect x="308" y="192" width="4" height="50" rx="2" fill="#3a3a3c"/>
  <rect x="546" y="155" width="4" height="60" rx="2" fill="#3a3a3c"/>

  <!-- Status bar -->
  <rect x="319" y="68" width="222" height="20" fill="#1c1c1e"/>
  <text x="329" y="82" fill="#a1a1aa" font-size="9">9:41</text>
  <text x="505" y="82" fill="#a1a1aa" font-size="9">📶 🔋</text>

  <!-- Browser with download in progress -->
  <rect x="319" y="88" width="222" height="30" fill="#252528"/>
  <rect x="329" y="96" width="142" height="14" rx="7" fill="#3a3a3c"/>
  <text x="400" y="106" text-anchor="middle" fill="#3b82f6" font-size="8">stuntbikextreme.com</text>
  <text x="474" y="106" fill="#71717a" font-size="11">↺</text>

  <!-- Page content (dimmed, blurred feel) -->
  <rect x="319" y="118" width="222" height="200" fill="#141414"/>
  <rect x="335" y="128" width="190" height="10" rx="5" fill="#252528"/>
  <rect x="335" y="144" width="170" height="8" rx="4" fill="#252528"/>
  <rect x="335" y="158" width="185" height="8" rx="4" fill="#252528"/>
  <rect x="335" y="172" width="150" height="8" rx="4" fill="#252528"/>
  <rect x="335" y="188" width="180" height="30" rx="7" fill="#252528"/>

  <!-- Download progress bar at bottom of browser -->
  <rect x="319" y="318" width="222" height="58" fill="#1c1c1e" stroke="#2c2c2e" stroke-width="1"/>

  <!-- Download item -->
  <text x="330" y="335" fill="#f5f5f5" font-family="system-ui,sans-serif" font-size="9" font-weight="600">StuntBikeExtreme.apk</text>
  <text x="330" y="348" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="8">63.7 MB of 85 MB • Downloading...</text>

  <!-- Progress bar in download tray -->
  <rect x="330" y="354" width="200" height="6" rx="3" fill="#2c2c2e"/>
  <rect x="330" y="354" width="150" height="6" rx="3" fill="url(#progFill)"/>

  <!-- Percentage in download tray -->
  <text x="490" y="349" fill="#dc2626" font-family="system-ui,sans-serif" font-size="9" font-weight="700">75%</text>

  <!-- Cancel download x -->
  <text x="526" y="350" fill="#71717a" font-size="12">✕</text>

  <!-- Spinning indicator on page -->
  <circle cx="430" cy="200" r="20" fill="none" stroke="#2c2c2e" stroke-width="3"/>
  <path d="M430 180 A20 20 0 0 1 450 200" fill="none" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  <text x="430" y="238" text-anchor="middle" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="9">Downloading...</text>

  <!-- Right tips -->
  <text x="590" y="200" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">Keep the browser</text>
  <text x="590" y="218" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">open while it saves</text>
  <text x="590" y="255" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">Speed depends on</text>
  <text x="590" y="273" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">your connection</text>
  <text x="590" y="311" fill="#22c55e" font-family="system-ui,sans-serif" font-size="11">✓ Almost there!</text>
</svg>
