<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#141414"/>
    </linearGradient>
    <filter id="glow1"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg1)"/>

  <!-- Left text area -->
  <rect x="30" y="30" width="64" height="24" rx="12" fill="#dc2626"/>
  <text x="62" y="47" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="700">STEP 1</text>

  <text x="30" y="100" fill="#f5f5f5" font-family="system-ui,sans-serif" font-size="26" font-weight="800">Open the</text>
  <text x="30" y="133" fill="#f5f5f5" font-family="system-ui,sans-serif" font-size="26" font-weight="800">Download Page</text>
  <text x="30" y="175" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="14">Go to the website using your</text>
  <text x="30" y="196" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="14">browser on any device.</text>

  <!-- Action indicator -->
  <rect x="30" y="225" width="230" height="44" rx="8" fill="#1c1c1e" stroke="#2c2c2e" stroke-width="1"/>
  <text x="50" y="243" fill="#71717a" font-family="system-ui,sans-serif" font-size="10">🌐  ADDRESS BAR</text>
  <text x="50" y="260" fill="#3b82f6" font-family="system-ui,sans-serif" font-size="12">stuntbikeextreme.com</text>

  <text x="30" y="310" fill="#71717a" font-family="system-ui,sans-serif" font-size="12">Type or search the website name</text>
  <text x="30" y="328" fill="#71717a" font-family="system-ui,sans-serif" font-size="12">in your browser's address bar.</text>

  <!-- Phone mockup -->
  <rect x="310" y="28" width="240" height="394" rx="28" fill="#1c1c1e" stroke="#3a3a3c" stroke-width="2"/>
  <!-- Notch -->
  <rect x="395" y="28" width="70" height="16" rx="8" fill="#0f0f0f"/>
  <!-- Screen -->
  <rect x="319" y="68" width="222" height="308" fill="#141414"/>
  <!-- Home bar -->
  <rect x="395" y="394" width="70" height="5" rx="3" fill="#3a3a3c"/>
  <!-- Side buttons -->
  <rect x="308" y="130" width="4" height="50" rx="2" fill="#3a3a3c"/>
  <rect x="308" y="192" width="4" height="50" rx="2" fill="#3a3a3c"/>
  <rect x="546" y="155" width="4" height="60" rx="2" fill="#3a3a3c"/>

  <!-- Browser chrome inside phone -->
  <rect x="319" y="68" width="222" height="36" fill="#252528"/>
  <!-- Back/fwd -->
  <text x="330" y="90" fill="#71717a" font-size="14">←</text>
  <text x="349" y="90" fill="#3a3a3c" font-size="14">→</text>
  <!-- URL bar -->
  <rect x="365" y="76" width="140" height="20" rx="10" fill="#3a3a3c"/>
  <text x="435" y="90" text-anchor="middle" fill="#3b82f6" font-family="system-ui,sans-serif" font-size="9">stuntbikeextreme.com</text>
  <!-- Reload -->
  <text x="514" y="90" fill="#71717a" font-size="13">↺</text>

  <!-- Website header in phone -->
  <rect x="319" y="104" width="222" height="36" fill="#1c1c1e"/>
  <text x="329" y="127" fill="#f5f5f5" font-family="system-ui,sans-serif" font-size="11" font-weight="700">🏍️ Stunt Bike Extreme</text>
  <line x1="319" y1="140" x2="541" y2="140" stroke="#dc2626" stroke-width="1.5"/>

  <!-- Website content -->
  <rect x="319" y="140" width="222" height="236" fill="#141414"/>
  <text x="370" y="170" text-anchor="middle" fill="#f5f5f5" font-family="system-ui,sans-serif" font-size="12" font-weight="700">Stunt Bike Extreme APK</text>
  <text x="370" y="187" text-anchor="middle" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="9">Download for free • Android</text>

  <!-- Tags -->
  <rect x="330" y="194" width="38" height="13" rx="6" fill="#2c2c2e"/>
  <text x="349" y="204" text-anchor="middle" fill="#a1a1aa" font-size="7">v2.4.1</text>
  <rect x="374" y="194" width="56" height="13" rx="6" fill="#2c2c2e"/>
  <text x="402" y="204" text-anchor="middle" fill="#a1a1aa" font-size="7">50M+ Downloads</text>

  <!-- Content lines -->
  <rect x="330" y="216" width="180" height="6" rx="3" fill="#2c2c2e"/>
  <rect x="330" y="228" width="155" height="6" rx="3" fill="#2c2c2e"/>
  <rect x="330" y="240" width="165" height="6" rx="3" fill="#2c2c2e"/>

  <!-- Download button in phone -->
  <rect x="330" y="258" width="180" height="32" rx="7" fill="#dc2626"/>
  <text x="420" y="279" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="700">⬇ Download APK — Free</text>

  <!-- More content lines -->
  <rect x="330" y="300" width="180" height="6" rx="3" fill="#2c2c2e"/>
  <rect x="330" y="312" width="140" height="6" rx="3" fill="#2c2c2e"/>
  <rect x="330" y="324" width="160" height="6" rx="3" fill="#2c2c2e"/>

  <!-- Glow on URL bar to draw attention -->
  <rect x="365" y="76" width="140" height="20" rx="10" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.7" filter="url(#glow1)"/>

  <!-- Arrow label -->
  <line x1="265" y1="237" x2="362" y2="87" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="362" cy="87" r="3" fill="#dc2626"/>

  <!-- Right side decoration dots -->
  <circle cx="610" cy="180" r="3" fill="#2c2c2e"/>
  <circle cx="625" cy="180" r="3" fill="#2c2c2e"/>
  <circle cx="640" cy="180" r="3" fill="#2c2c2e"/>
  <text x="614" y="210" fill="#3a3a3c" font-family="system-ui,sans-serif" font-size="11">Open browser</text>
  <text x="614" y="228" fill="#3a3a3c" font-family="system-ui,sans-serif" font-size="11">→ type URL</text>
  <text x="614" y="246" fill="#3a3a3c" font-family="system-ui,sans-serif" font-size="11">→ tap Search</text>
</svg>
