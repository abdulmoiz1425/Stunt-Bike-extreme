  <text x="348" y="283" text-anchor="middle" font-size="16">📱</text>
  <rect x="374" y="260" width="36" height="36" rx="8" fill="#252528"/>
  <text x="392" y="283" text-anchor="middle" font-size="16">🎮</text>
  <rect x="418" y="260" width="36" height="36" rx="8" fill="#252528"/>
  <text x="436" y="283" text-anchor="middle" font-size="16">📁</text>
