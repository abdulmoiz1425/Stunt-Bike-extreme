  <text x="590" y="218" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">the top of screen</text>
  <text x="590" y="255" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">Tap the download</text>
  <text x="590" y="273" fill="#dc2626" font-family="system-ui,sans-serif" font-size="11" font-weight="600">notification</text>
  <text x="590" y="291" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">to open the file</text>
