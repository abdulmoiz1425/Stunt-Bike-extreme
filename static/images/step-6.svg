<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <filter id="glow6"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="450" fill="#0f0f0f"/>

  <!-- Step badge -->
  <rect x="30" y="30" width="64" height="24" rx="12" fill="#dc2626"/>
  <text x="62" y="47" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="700">STEP 6</text>

  <!-- Left text -->
  <text x="30" y="100" fill="#f5f5f5" font-family="system-ui,sans-serif" font-size="26" font-weight="800">Open the</text>
  <text x="30" y="133" fill="#f5f5f5" font-family="system-ui,sans-serif" font-size="26" font-weight="800">APK File</text>
  <text x="30" y="175" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="14">Tap the file to open it.</text>
  <text x="30" y="196" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="14">A security prompt is normal.</text>

  <!-- Warning note on left -->
  <rect x="30" y="220" width="240" height="72" rx="10" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="50" y="243" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="11" font-weight="700">⚠  This is Normal</text>
  <text x="50" y="260" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="11">Android shows a security</text>
  <text x="50" y="276" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="11">prompt for all APK installs.</text>

  <text x="30" y="330" fill="#71717a" font-family="system-ui,sans-serif" font-size="12">Go to Settings and enable</text>
  <text x="30" y="348" fill="#71717a" font-family="system-ui,sans-serif" font-size="12">"Unknown Sources" if asked.</text>

  <!-- Phone mockup -->
  <rect x="310" y="28" width="240" height="394" rx="28" fill="#1c1c1e" stroke="#3a3a3c" stroke-width="2"/>
  <rect x="395" y="28" width="70" height="16" rx="8" fill="#0f0f0f"/>
  <rect x="319" y="68" width="222" height="308" fill="#141414"/>
  <rect x="395" y="394" width="70" height="5" rx="3" fill="#3a3a3c"/>
  <rect x="308" y="130" width="4" height="50" rx="2" fill="#3a3a3c"/>
  <rect x="308" y="192" width="4" height="50" rx="2" fill="#3a3a3c"/>
  <rect x="546" y="155" width="4" height="60" rx="2" fill="#3a3a3c"/>

  <!-- Status bar -->
  <rect x="319" y="68" width="222" height="20" fill="#1c1c1e"/>
  <text x="329" y="82" fill="#a1a1aa" font-size="9">9:41</text>
  <text x="505" y="82" fill="#a1a1aa" font-size="9">📶 🔋</text>

  <!-- Dimmed phone background -->
  <rect x="319" y="88" width="222" height="288" fill="#0a0a0a" opacity="0.7"/>

  <!-- Security dialog — main element -->
  <rect x="323" y="120" width="214" height="240" rx="16" fill="#1c1c1e" stroke="#3a3a3c" stroke-width="1.5"/>

  <!-- Shield icon at top -->
  <circle cx="430" cy="153" r="22" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.3)" stroke-width="1.5"/>
  <text x="430" y="160" text-anchor="middle" font-size="20">🛡️</text>

  <!-- Dialog title -->
  <text x="430" y="188" text-anchor="middle" fill="#f5f5f5" font-family="system-ui,sans-serif" font-size="12" font-weight="700">Install Unknown App?</text>
  <line x1="338" y1="196" x2="522" y2="196" stroke="#2c2c2e" stroke-width="1"/>

  <!-- File info -->
  <text x="430" y="214" text-anchor="middle" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="9">StuntBikeExtreme.apk</text>
  <text x="430" y="228" text-anchor="middle" fill="#71717a" font-family="system-ui,sans-serif" font-size="9">Source: Downloads folder</text>

  <!-- Toggle row for settings -->
  <rect x="338" y="238" width="198" height="36" rx="8" fill="#252528"/>
  <text x="352" y="254" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="9">Allow from this source</text>
  <text x="352" y="267" fill="#71717a" font-family="system-ui,sans-serif" font-size="8">Settings → Special App Access</text>
  <!-- Toggle switch ON -->
  <rect x="498" y="244" width="32" height="18" rx="9" fill="#22c55e" filter="url(#glow6)"/>
  <circle cx="521" cy="253" r="7" fill="white"/>

  <!-- Allow button -->
  <rect x="338" y="284" width="198" height="36" rx="9" fill="#dc2626"/>
  <text x="430" y="307" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="12" font-weight="700">Allow Installation</text>

  <!-- Cancel -->
  <text x="430" y="338" text-anchor="middle" fill="#71717a" font-family="system-ui,sans-serif" font-size="10">Cancel</text>

  <!-- Arrow pointing to Allow button -->
  <path d="M286 335 Q310 335 330 302" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="330" cy="302" r="3" fill="#dc2626"/>

  <!-- Right tips -->
  <text x="590" y="200" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">This prompt is</text>
  <text x="590" y="218" fill="#22c55e" font-family="system-ui,sans-serif" font-size="11" font-weight="600">completely normal</text>
  <text x="590" y="255" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">Android asks this</text>
  <text x="590" y="273" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">for all APK files</text>
  <text x="590" y="311" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">Tap</text>
  <text x="609" y="311" fill="#dc2626" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Allow</text>
  <text x="641" y="311" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">to continue</text>
</svg>
