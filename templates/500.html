{% extends "base.html" %}

{% block title %}500 — Server Error{% endblock %}

{% block content %}
<section class="section" style="min-height:70vh; display:flex; align-items:center;">
  <div class="container text-center">
    <div style="font-size:5rem; margin-bottom:1rem;">⚠️</div>
    <h1 style="font-size:6rem; color:var(--primary); margin:0; line-height:1;">500</h1>
    <h2 class="page-title">Something Went Wrong</h2>
    <p class="lead-text">
      Our server encountered an error. Our team has been notified. Please try again in a few moments.
    </p>
    <div style="margin-top:2rem;">
      <a href="{% url 'home' %}" class="btn btn-download btn-lg">🏠 Back to Home</a>
    </div>
  </div>
</section>
{% endblock %}
